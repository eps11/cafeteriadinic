<app-top-nav (sidenavToggle)="sideNav.toggle()"></app-top-nav>
<mat-sidenav-container [style.marginTop.px]="mobileQuery.matches ? 56 : 0">
    <mat-sidenav #sideNav [mode]="mobileQuery.matches ? 'over' : 'side'" [fixedInViewport]="mobileQuery.matches" fixedTopGap="56">
        <mat-nav-list style="margin-top: 67px;">
            <a mat-list-item *ngFor="let item of menuItems" routerLink="{{ item.routerLink }}">
                <mat-icon>{{ item.matIcon }}</mat-icon>&nbsp;{{ item.title }}
            </a>
        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content style="margin-top: 67px;">
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>
