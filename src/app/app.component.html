<app-top-nav (sidenavToggle)="sideNav.toggle()"></app-top-nav>
<mat-sidenav-container class="example-sidenav-container">
    <mat-sidenav #sideNav [mode]="mobileQuery.matches ? 'over' : 'side'" [fixedInViewport]="true">
        <mat-nav-list style="margin-top: 67px;">
            <a mat-list-item *ngFor="let item of menuItems" routerLink="{{ item.routerLink }}">
                <mat-icon>{{ item.matIcon }}</mat-icon>&nbsp;{{ item.title }}
            </a>
        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content style="margin-top: 67px;">
        <cdk-virtual-scroll-viewport itemSize="50" style="height: 100% !important;">
         <router-outlet></router-outlet>
        </cdk-virtual-scroll-viewport>
        <!--<div class="footer">-->
            <!--<p>Necessary?</p>-->
        <!--</div>-->
    </mat-sidenav-content>
</mat-sidenav-container>
