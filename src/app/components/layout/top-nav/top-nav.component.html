<mat-toolbar color="primary" class="top-nav-fixed">
    <div class="menu-button">
        <mat-icon
                (click)="sidenavToggle.emit(null)"
                style="cursor: pointer"
        >menu</mat-icon>
    </div>
    <div class="title">{{ title }}</div>
    <div class="spacer"></div>
    <div class="links">
        <i
                *ngFor="let item of menuItems"
                (click)="menuService.redirectToNewTab(item.link)"
                style="cursor: pointer"
                class="{{ item.classes }}"
                [ngStyle]="item.styles"
        ></i>
    </div>
</mat-toolbar>
